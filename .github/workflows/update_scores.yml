name: Update Live Scores

on:
  schedule:
    # S'exécute une fois par jour à 02:00 UTC (04:00 heure française/locale)
    - cron: '*/5 * * * *'
  # Permet également de lancer la mise à jour manuellement depuis l'interface GitHub
  workflow_dispatch:

env:
  # Force l'utilisation de Node.js 24 pour éviter les avertissements de dépréciation de Node 20
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-scores:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Requis pour pouvoir push le fichier CSV mis à jour

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run update script
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          # Exécute le script avec la boucle haute fréquence.
          # S'il y a un match en direct, le script bouclera 5 fois (1 fois par minute).
          # Sinon, il fera une unique exécution immédiate pour économiser les ressources.
          python3 update_scores.py --live-loop
