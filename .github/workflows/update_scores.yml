name: Update Live Scores

on:
  schedule:
    # S'exécute toutes les 5 minutes
    - cron: '*/5 * * * *'
  # Permet également de lancer la mise à jour manuellement depuis l'interface GitHub
  workflow_dispatch:

env:
  # Force l'utilisation de Node.js 24 pour éviter les avertissements de dépréciation de Node 20
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-scores:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Requis pour pouvoir push le fichier CSV mis à jour

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          pip install firebase-admin PyJWT httpx[http2]

      - name: Run update script
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY || secrets.FOOTBALL_DATA_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          APNS_KEY_ID: ${{ secrets.APNS_KEY_ID }}
          APNS_TEAM_ID: ${{ secrets.APNS_TEAM_ID }}
          APNS_PRIVATE_KEY: ${{ secrets.APNS_PRIVATE_KEY }}
          APNS_BUNDLE_ID: ${{ secrets.APNS_BUNDLE_ID }}
          PYTHONUNBUFFERED: 1
          APNS_SANDBOX: "false"
        run: |
          # 1. Coupe du Monde
          python3 update_scores.py --league WC2026 --live-loop
          
          # 2. La Liga
          git pull --rebase
          python3 update_scores.py --league LALIGA --live-loop
          
          # 3. Serie A
          git pull --rebase
          python3 update_scores.py --league SERIEA --live-loop
          
          # 4. Bundesliga
          git pull --rebase
          python3 update_scores.py --league BUNDESLIGA --live-loop
          
          # 5. Champions League
          git pull --rebase
          python3 update_scores.py --league CL --live-loop
          
          # 6. Premier League
          git pull --rebase
          python3 update_scores.py --league PL --live-loop
          
          # 7. Ligue 1
          git pull --rebase
          python3 update_scores.py --league L1 --live-loop
          
          # 8. Brasileirão
          git pull --rebase
          python3 update_scores.py --league BSA --live-loop
